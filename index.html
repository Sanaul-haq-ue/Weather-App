<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter City name" spellcheck="false">
            <button> <img src="images/search.png" alt=""></button>
        </div>
        <div class="weather">
            <img src="images/rain.png" alt="" class="weather-icon">
            <h1 class="temp">0°C</h1>
            <h2 class="city"> Nan</h2>
            <div class="details">
                <div class="col">
                    <img src="images/humidity.png" alt="">
                    <div>
                        <p class="humidity">0%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png" alt="">
                    <div>
                        <p class="wind">0 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        let apiKey = "5960a8ae86af955b5010ef024b956da0";
        let apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

        let searchBox = $('.search input');
        let searchBtn = $('.search button');
        let weatherIcon = $('.weather-icon');

        async function checkWeather(city) {
            let response = await fetch(apiUrl + city + `&appid=${apiKey}`)
            var data = await response.json();

            console.log(data);
            if (data.cod == "404") {
                alert("City not found");
                return;
            }
            $('.city').text(data.name);
            $('.temp').text(Math.round(data.main.temp) + "°C");
            $('.humidity').text(data.main.humidity + "%");
            $('.wind').text(data.wind.speed + " km/h");

            if(data.weather[0].main == 'Clouds'){
                weatherIcon.attr('src',"images/clouds.png");
            }else if(data.weather[0].main == 'Clear'){
                weatherIcon.attr('src',"images/clear.png");
            }else if(data.weather[0].main == 'Rain'){
                weatherIcon.attr('src',"images/rain.png");
            }else if(data.weather[0].main == 'Drizzle'){
                weatherIcon.attr('src',"images/drizzle.png");
            }else if(data.weather[0].main == 'Mist'){
                weatherIcon.attr('src',"images/mist.png");
            }


        };

        searchBtn.click(function () {
            checkWeather(searchBox.val());
        });

        searchBox.keypress(function(ev){
            if(ev.which == 13){
                checkWeather(searchBox.val());
            }
        });

        checkWeather('Dhaka');

    </script>


</body>

</html>
